{% extends 'diseases/base.html' %}

{% block content %}
<div class="auth-card">
    <h2>Вхід у систему</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Логін:</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Пароль:</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-register">Увійти</button>
    </form>
    <div class="auth-footer">
        Немає акаунта? <a href="{% url 'register' %}">Зареєструватися</a>
    </div>
</div>
{% endblock %}
